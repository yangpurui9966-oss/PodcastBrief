version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: podcastbrief
      POSTGRES_PASSWORD: podcastbrief
      POSTGRES_DB: podcastbrief
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  # 注意：Next.js、Worker、MLX-Whisper 在 macOS 上直接运行，不通过 Docker 部署
  # MLX-Whisper 依赖 Apple Silicon GPU，无法容器化

volumes:
  postgres-data:
  redis-data:
