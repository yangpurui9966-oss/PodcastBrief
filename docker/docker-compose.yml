version: '3.8'

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  # 注意：Worker 和 MLX-Whisper 服务在 macOS 上本地运行，不通过 Docker 部署
  # 原因：MLX-Whisper 依赖 Apple Silicon GPU，必须在 macOS 上运行
  # 本地开发启动方式：
  #   1. pnpm redis      # 启动 Redis（Docker）
  #   2. pnpm whisper    # 启动 MLX-Whisper Python 服务
  #   3. pnpm worker     # 启动 Node.js Worker
  #   4. pnpm dev        # 启动 Next.js 开发服务器

volumes:
  redis-data:
