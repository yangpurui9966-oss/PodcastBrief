version: '3.8'

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    restart: unless-stopped
    env_file:
      - ../.env
    depends_on:
      - redis
    volumes:
      - worker-logs:/app/logs

volumes:
  redis-data:
  worker-logs:
